services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/assets/fonts:/fonts:ro
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8000
      - CHALK_FONT_PATH=/fonts/Chalk-JP.otf
      # ブラウザからのフロント origin（カンマ区切り）。未設定時は開発向けに全許可相当の緩設定。
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # 任意: ホストのフォントをマウントした場合にパスを指定（例: - ./backend/assets/fonts:/fonts として CHALK_FONT_PATH=/fonts/My.ttf）
      # - CHALK_FONT_PATH=/fonts/MyChalk.ttf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ブラウザからホストのバックエンドへ到達するための公開URL
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
